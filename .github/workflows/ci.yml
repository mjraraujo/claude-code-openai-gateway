name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs for the same ref when a newer push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── TypeScript type check (all TS packages) ─────────────────────────────
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies (web)
        run: npm ci
        working-directory: web

      - name: tsc --noEmit (web)
        run: npx tsc --noEmit
        working-directory: web

  # ── Unit tests ──────────────────────────────────────────────────────────
  unit:
    name: Unit tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20.x"]
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test -- --reporter=verbose --reporter=github-actions

      - name: Build
        run: npm run build

  # ── Coverage report ─────────────────────────────────────────────────────
  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install V8 coverage provider
        run: npm install --no-save @vitest/coverage-v8

      - name: Run tests with coverage
        run: |
          npm test -- \
            --coverage \
            --coverage.provider=v8 \
            --coverage.reporter=text \
            --coverage.reporter=json-summary

      - name: Write coverage summary to job
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require("fs");
            const p = `${process.env.GITHUB_WORKSPACE}/web/coverage/coverage-summary.json`;
            if (!fs.existsSync(p)) { core.warning("No coverage-summary.json found"); return; }
            const { total } = JSON.parse(fs.readFileSync(p, "utf-8"));
            await core.summary
              .addHeading("Test Coverage")
              .addTable([
                [{ data: "Metric", header: true }, { data: "Coverage", header: true }],
                ["Statements", `${total.statements.pct}%`],
                ["Branches",   `${total.branches.pct}%`],
                ["Functions",  `${total.functions.pct}%`],
                ["Lines",      `${total.lines.pct}%`],
              ])
              .write();

  # ── Integration tests ───────────────────────────────────────────────────
  # Placeholder: wire up integration tests here once test files exist in
  # web/src/**/*.integration.test.ts or a top-level integration/ directory.
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Integration tests
        run: |
          # Run integration tests if any exist; skip gracefully otherwise.
          if npx vitest list --run --reporter=dot 2>/dev/null | grep -q integration; then
            npx vitest run --reporter=verbose src/**/*.integration.test.ts
          else
            echo "No integration tests found — skipping."
          fi
