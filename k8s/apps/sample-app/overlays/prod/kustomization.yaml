apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sample-app-prod

resources:
  - ../../base

nameSuffix: -prod

patches:
  - target:
      kind: Deployment
      name: sample-app
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: prod

images:
  - name: sample-app
    newName: 000000000000.dkr.ecr.us-east-1.amazonaws.com/sample-app
    newTag: bootstrap
