apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-app-dev
  namespace: argocd
  labels:
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/part-of: mti-demo
spec:
  project: workloads
  source:
    repoURL: "${GIT_REPO_URL}"
    targetRevision: HEAD
    path: k8s/apps/sample-app/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: sample-app-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
